<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch Me Game</title>
    <style>
        body {
            height: 100vh;
            padding: 0;
            margin: 0;
            background-color: rgb(49, 141, 246);
            overflow: hidden;
            cursor: none; 
            touch-action: none; 
        }

        button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 12px 20px;
            font-size: 18px;
            font-weight: bold;
            color: rgb(10, 10, 10);
            background-color: #ffff47;
            border: none;
            border-radius: 12px;
            cursor: none; 
            overflow: hidden;
            transition: top 0.05s, left 0.05s; 

            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
        }

        button img {
            width: 200px; 
            height: 200px;
            object-fit: contain;
        }

        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 180px; 
            height: 180px; 
            pointer-events: none; 
            z-index: 9999; 
            border-radius: 50%;
            object-fit: cover; 
            background-color: #ffffff; 
            padding: 10px;
            box-sizing: border-box;
        }

        @media (max-width: 768px) {
            body {
                cursor: auto;
            }
            
            .custom-cursor {
                display: none; 
            }

            button {
                padding: 10px 15px;
                font-size: 15px;
            }

            button img {
                width: 130px;
                height: 130px;
            }
        }
    </style>
</head>
<body>

    <img src="Tom.png" class="custom-cursor" id="customCursor">

    <button id="btn">
        <img src="Leo.png">
        <span>Catch me if you can! ╰┈➤</span>
    </button>

<script>
    const btn = document.querySelector("#btn");
    const cursor = document.querySelector("#customCursor");
    
    function moveButton() {
        const x = Math.floor((window.innerWidth - btn.clientWidth) * Math.random());
        const y = Math.floor((window.innerHeight - btn.clientHeight) * Math.random());
        
        btn.style.left = `${x}px`;
        btn.style.top = `${y}px`;
        btn.style.transform = "translate(0, 0)";
    }

    window.addEventListener("mousemove", (e) => {
        cursor.style.left = `${e.clientX - 90}px`;
        cursor.style.top = `${e.clientY - 90}px`;
    });

    btn.addEventListener("mouseover", moveButton);
    btn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        moveButton();
    });
</script>
</body>
</html>
