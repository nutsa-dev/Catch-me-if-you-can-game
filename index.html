<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch Me If You Can Game</title>
    <style>
        body {
            height: 100vh;
            padding: 0;
            margin: 0;
            background-color: rgb(49, 141, 246);
            overflow: hidden;
            cursor: none; 
            touch-action: none; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .instruction-text {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            margin: 0;
            font-size: 20px;
            color: #ffffff;
            font-weight: 600;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }

        .mobile-only {
            display: none;
        }

        button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 0 12px 12px 12px;
            font-size: 18px;
            font-weight: bold;
            color: rgb(10, 10, 10);
            background-color: #ffff47;
            box-shadow: 0 0 13px rgb(10, 10, 10);
            border: none;
            border-radius: 12px;
            cursor: none; 
            overflow: hidden;
            transition: top 0.05s, left 0.05s; 

            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        button img {
            width: 200px; 
            height: 200px;
            object-fit: contain;
        }

        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 200px; 
            height: 200px; 
            pointer-events: none; 
            z-index: 9999; 
            border-radius: 50%;
            object-fit: cover; 
            background-color: #ffffff; 
            box-shadow: 0 0 13px rgb(10, 10, 10);
            padding: 12px;
            box-sizing: border-box;
        }

        @media (max-width: 768px) {
            body {
                cursor: auto;
            }
            
            .custom-cursor {
                display: none; 
            }

            .desktop-only {
                display: none;
            }
            .mobile-only {
                display: block;
            }

            .instruction-text {
                font-size: 16px;
                top: 15px;
                width: 90%;
                box-sizing: border-box;
            }

            button {
                padding: 2px 9px;
                box-shadow: none;
            }

            button span {
                display: none;
            }

            button img {
                width: 100px;
                height: 100px;
                display: block; 
            }
        }
    </style>
</head>
<body>

    <h1 class="instruction-text">
        <span class="desktop-only">Help Carl (Tom Hanks) to catch Frank (Leonardo DiCaprio) by clicking on his picture</span>
        <span class="mobile-only">Catch Frank (Leonardo DiCaprio) if you can by clicking on his picture</span>
    </h1>

    <img src="Tom.png" class="custom-cursor" id="customCursor">

    <button id="btn">
        <img src="Leo.png">
        <span>Catch me if you can!</span>
    </button>

<script>
    const btn = document.querySelector("#btn");
    const cursor = document.querySelector("#customCursor");
    
    function moveButton() {
        const x = Math.floor((window.innerWidth - btn.clientWidth) * Math.random());
        const y = Math.floor((window.innerHeight - btn.clientHeight - 60) * Math.random() + 60);
        
        btn.style.left = `${x}px`;
        btn.style.top = `${y}px`;
        btn.style.transform = "translate(0, 0)";
    }

    window.addEventListener("mousemove", (e) => {
        const cursorRadius = 90; 

        let targetX = e.clientX - cursorRadius;
        let targetY = e.clientY - cursorRadius;
        let minX = 0;
        let maxX = window.innerWidth - (cursorRadius * 2);
        let minY = 0;
        let maxY = window.innerHeight - (cursorRadius * 2);
        let finalX = Math.max(minX, Math.min(targetX, maxX));
        let finalY = Math.max(minY, Math.min(targetY, maxY));

        cursor.style.left = `${finalX}px`;
        cursor.style.top = `${finalY}px`;
    });

    btn.addEventListener("mouseover", moveButton);
    btn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        moveButton();
    });
</script>
</body>
</html>
